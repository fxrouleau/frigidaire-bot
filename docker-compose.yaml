services:
  frigidaire-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        GIT_SHA: "${GIT_SHA:-}"
    environment:
      - CLIENT_SECRET=${CLIENT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - REPORT_CHANNEL_ID=${REPORT_CHANNEL_ID:-}
    volumes:
      - ./data:/app/data

  test:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    user: node
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RUN_LIVE=${RUN_LIVE:-}
      - DEBUG_CAPTURE=${DEBUG_CAPTURE:-}

name: docker-push.yml
on:
  workflow_dispatch:
  push:
    paths:
        - 'Dockerfile'
        - 'docker-compose.yaml'
        - '.github/workflows/**'
        - 'package.json'
        - 'yarn.lock'
        - '.dockerignore'
        - 'src/**'
        - 'tsconfig.json'
        - 'tsconfig.test.json'
        - 'vitest.config.ts'
        - 'biome.json'
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Run lint, typecheck, build, and tests in container
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE_TAG=$(date +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/frigidaire-bot
          tags: |
            type=raw,value=${{ steps.tags.outputs.date_tag }}
            type=raw,value=sha-${{ steps.tags.outputs.sha_tag }}
            type=raw,value=latest

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
